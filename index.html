<!DOCTYPE html>
<html lang="id">
<head>

<style>
  :root{
    --biru-tua:#0B3D63;
    --biru:#0F5FA6;
    --biru-muda:#E8F1FA;
    --amber:#FE9800;
    --amber-dark:#D97D00;
    --hijau:#1E8E5A;
    --merah:#D64545;
    --abu:#F4F6F8;
    --garis:#E1E7EC;
    --teks:#1B2733;
    --teks-lemah:#6B7A88;
    --radius:14px;
    --shadow:0 2px 10px rgba(11,61,99,.08);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--abu);color:var(--teks);}
  h1,h2,h3{margin:0;font-weight:700;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--abu);display:flex;flex-direction:column;position:relative;}

  /* ---------- LOGIN ---------- */
  #loginScreen{position:fixed;inset:0;background:linear-gradient(160deg,var(--biru-tua),var(--biru) 70%);display:flex;align-items:center;justify-content:center;padding:24px;z-index:50;}
  .login-card{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 20px 50px rgba(0,0,0,.25);}
  .brand{display:flex;flex-direction:column;align-items:center;margin-bottom:22px;}
  .brand .logo{width:56px;height:56px;border-radius:16px;background:var(--amber);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:22px;margin-bottom:10px;}
  .brand h1{font-size:20px;color:var(--biru-tua);letter-spacing:.5px;}
  .brand p{margin:2px 0 0;font-size:12.5px;color:var(--teks-lemah);text-align:center;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;color:var(--teks-lemah);margin-bottom:6px;font-weight:600;}
  .field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--garis);border-radius:10px;font-size:15px;background:#fbfcfd;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--biru);}
  .btn{border:none;border-radius:11px;padding:12px 18px;font-size:15px;font-weight:700;width:100%;transition:.15s;}
  .btn-primary{background:var(--amber);color:#fff;}
  .btn-primary:active{background:var(--amber-dark);}
  .btn-outline{background:#fff;border:1.5px solid var(--garis);color:var(--teks);}
  .btn-danger{background:#fdeaea;color:var(--merah);}
  .error-msg{color:var(--merah);font-size:13px;margin-top:8px;text-align:center;min-height:16px;}

  /* ---------- HEADER ---------- */
  header.topbar{background:linear-gradient(120deg,var(--biru-tua),var(--biru));color:#fff;padding:18px 18px 44px;position:relative;}
  header.topbar .row{display:flex;justify-content:space-between;align-items:flex-start;}
  header.topbar h1{font-size:18px;}
  header.topbar .sub{font-size:12px;opacity:.85;margin-top:2px;}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;}
  main{flex:1;padding:0 16px 90px;margin-top:-20px;}

  /* ---------- DASHBOARD ---------- */
  .grid-menu{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px;}
  .menu-card{background:#fff;border-radius:var(--radius);padding:18px 14px;box-shadow:var(--shadow);text-align:left;border:none;}
  .menu-card .ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:10px;}
  .menu-card h3{font-size:14px;}
  .menu-card p{font-size:11.5px;color:var(--teks-lemah);margin:3px 0 0;}
  .stat-row{display:flex;gap:10px;margin-top:14px;}
  .stat{flex:1;background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);text-align:center;}
  .stat b{font-size:22px;display:block;color:var(--biru-tua);}
  .stat span{font-size:11px;color:var(--teks-lemah);}

  /* ---------- TABS/NAV ---------- */
  nav.bottomnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--garis);display:flex;max-width:520px;margin:0 auto;box-shadow:0 -2px 12px rgba(0,0,0,.06);z-index:20;}
  nav.bottomnav button{flex:1;background:none;border:none;padding:9px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--teks-lemah);font-size:10.5px;font-weight:600;}
  nav.bottomnav button.active{color:var(--amber-dark);}
  nav.bottomnav .ic{font-size:19px;}

  /* ---------- PAGE HEADER ---------- */
  .page-head{display:flex;align-items:center;gap:10px;padding-top:38px;margin-bottom:10px;position:relative;z-index:2;}
  .page-head h2{font-size:17px;color:var(--biru-tua);}
  .back-btn{background:#fff;border:1px solid var(--garis);width:34px;height:34px;border-radius:10px;font-size:16px;}

  .datebar{display:flex;gap:8px;align-items:center;background:#fff;padding:10px 12px;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;}
  .datebar input[type=date]{flex:1;border:none;font-size:14.5px;font-weight:600;color:var(--biru-tua);}
  .icon-btn{background:var(--biru-muda);border:none;width:36px;height:36px;border-radius:9px;font-size:15px;color:var(--biru);}

  .section-label{font-size:11.5px;font-weight:800;color:var(--teks-lemah);letter-spacing:.6px;text-transform:uppercase;margin:16px 2px 8px;}

  .work-card{background:#fff;border-radius:var(--radius);padding:13px 14px;margin-bottom:9px;box-shadow:var(--shadow);border-left:4px solid var(--biru);}
  .work-card.padam{border-left-color:var(--merah);}
  .work-card .top{display:flex;justify-content:space-between;gap:8px;}
  .work-card h4{font-size:14px;line-height:1.35;}
  .work-card .meta{font-size:11.5px;color:var(--teks-lemah);margin-top:5px;line-height:1.6;}
  .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;height:fit-content;}
  .badge.padam{background:#fdeaea;color:var(--merah);}
  .badge.tidak{background:#e8f6ee;color:var(--hijau);}
  .badge.selesai{background:#e8f6ee;color:var(--hijau);}
  .badge.proses{background:#fff4e0;color:var(--amber-dark);}
  .badge.batal{background:#fdeaea;color:var(--merah);}
  .badge.belum{background:#eef1f4;color:var(--teks-lemah);}
  .work-card .actions{display:flex;gap:8px;margin-top:10px;}
  .work-card .actions button{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;border:1px solid var(--garis);background:#fafbfc;}
  .empty-state{text-align:center;padding:40px 16px;color:var(--teks-lemah);}
  .empty-state .ic{font-size:36px;margin-bottom:8px;}

  .fab{position:fixed;bottom:80px;right:calc(50% - 260px + 18px);width:56px;height:56px;border-radius:50%;background:var(--amber);color:#fff;font-size:26px;border:none;box-shadow:0 6px 16px rgba(254,152,0,.45);z-index:25;}
  @media(max-width:560px){.fab{right:18px;}}

  /* ---------- MODAL / SHEET ---------- */
  .sheet-overlay{position:fixed;inset:0;background:rgba(11,20,30,.5);display:none;align-items:flex-end;z-index:60;}
  .sheet-overlay.open{display:flex;}
  .sheet{background:#fff;width:100%;max-width:520px;margin:0 auto;border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;padding:18px 18px 26px;}
  .sheet-handle{width:38px;height:4px;background:var(--garis);border-radius:4px;margin:0 auto 14px;}
  .sheet h2{font-size:17px;color:var(--biru-tua);margin-bottom:4px;}
  .sheet .sub{font-size:12.5px;color:var(--teks-lemah);margin-bottom:16px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .radio-group{display:flex;gap:10px;}
  .radio-opt{flex:1;border:1.5px solid var(--garis);border-radius:10px;padding:10px;text-align:center;font-size:13.5px;font-weight:600;color:var(--teks-lemah);}
  .radio-opt.sel{border-color:var(--biru);background:var(--biru-muda);color:var(--biru-tua);}
  .sheet-actions{display:flex;gap:10px;margin-top:18px;}
  .close-x{position:absolute;top:16px;right:18px;background:var(--abu);border:none;width:30px;height:30px;border-radius:50%;font-size:14px;color:var(--teks-lemah);}

  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--teks);color:#fff;padding:11px 20px;border-radius:30px;font-size:13.5px;z-index:80;opacity:0;transition:.25s;pointer-events:none;}
  .toast.show{opacity:1;bottom:110px;}

  .search-bar{display:flex;gap:8px;background:#fff;border-radius:var(--radius);padding:10px 12px;box-shadow:var(--shadow);margin-bottom:14px;align-items:center;}
  .search-bar input{flex:1;border:none;font-size:14px;}

  .photo-row{display:flex;gap:10px;margin-top:6px;}
  .photo-slot{flex:1;aspect-ratio:1;border-radius:12px;border:1.5px dashed var(--garis);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;background:#fafbfc;color:var(--teks-lemah);font-size:12px;flex-direction:column;gap:4px;}
  .photo-slot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}

  .loader{border:3px solid var(--garis);border-top-color:var(--amber);border-radius:50%;width:22px;height:22px;animation:spin .8s linear infinite;margin:0 auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .hidden{display:none !important;}
  a{color:var(--biru);}
</style>
</head>
<body>

<!-- ============================= LOGIN ============================= -->
<div id="loginScreen">
  <div class="login-card">
    <div class="brand">
      <div class="logo">SL</div>
      <h1>SIMONALISA</h1>
      <p>Sistem Monitoring Rencana &amp; Realisasi Kerja<br>UPT Padang Sidempuan</p>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="Masukkan username" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Masukkan password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="btnLogin">Masuk</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- ============================= APP ============================= -->
<div id="app" class="hidden">

  <header class="topbar">
    <div class="row">
      <div>
        <h1>SIMONALISA</h1>
        <div class="sub">UPT Padang Sidempuan · <span id="todayLabel"></span></div>
      </div>

  </header>

  <main id="mainContent"></main>

    <button data-page="rencana"><span class="ic">🗓️</span>Rencana</button>
    <button data-page="realisasi"><span class="ic">✅</span>Realisasi</button>
    <button data-page="alatuji"><span class="ic">🧰</span>Alat Uji</button>
    <button data-page="akun"><span class="ic">👤</span>Akun</button>
  </nav>

  <button class="fab hidden" id="fabAdd">+</button>
</div>

<!-- ============================= SHEET / MODAL ============================= -->
<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet" id="sheetContent" style="position:relative;"></div>
</div>

<!-- ============================= SCANNER BARCODE (Alat Uji) ============================= -->
<div class="sheet-overlay" id="scannerOverlay" style="z-index:70;">
  <div class="sheet" style="max-height:82vh;position:relative;">
    <button class="close-x" onclick="closeScanner()">✕</button>
    <div class="sheet-handle"></div>
    <h2>Scan Barcode Alat Uji</h2>
    <div class="sub">Arahkan kamera ke barcode/QR pada label alat</div>
    <div id="qrReader" style="width:100%;border-radius:12px;overflow:hidden;margin-top:4px;background:#000;"></div>
    <div id="qrStatus" style="text-align:center;font-size:12.5px;color:var(--teks-lemah);margin-top:10px;">Menyalakan kamera...</div>
    <button class="btn btn-outline" style="margin-top:14px;" onclick="closeScanner()">Tutup</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
/* ============================================================
   KONFIGURASI — ganti dengan URL Web App Apps Script Anda
   ============================================================ */
const CONFIG = {
  API_URL: "https://script.google.com/macros/s/AKfycbyBkbVLJG2QctpEH9Pr_lBq59tmkwx5hbw86X7WWpTo7lEUbPprSs8VcKloJHE5Z99gAw/exec"
};

/* Daftar tetap Jenis Pekerjaan (sesuai permintaan, tidak perlu ke server) */
const JENIS_PEKERJAAN_LIST = [

  "Pemeliharaan Trafo Bay",
  "Pemeliharaan SUTT / SUTET / SKTT",

  "Lain - Lain"

/* Daftar tetap Segmen SUTT/SUTET (sesuai permintaan, tidak perlu ke server / sheet DataSUTT) */
const DATASUTT_LIST = [

  "Tebing Tinggi - Kuala Tanjung 2. 150kV",
  "Kuala Tanjung - KEK Sei Mangke 1. 150 kV",

  "Incomer Hasang1. Hasang - Rantau Prapat2.", // CATATAN: baris ini tampak tergabung saat disalin dari sumber aslinya, mohon dicek & disesuaikan manual jika perlu

  "Kisaran - Tanjung Balai 2. 150 kV",

  "Sibolga - Martabe 2. 150kV",

  "Sipan Sihaporas 2 - Sibolga 150kV",

  "Sarula (Sumut IV) - New Padang Sidempuan 2. 275 kV",
  "New Padang Sidempuan - Padang Sidempuan 1. 150 kV",
  "New Padang Sidempuan - Padang Sidempuan 2. 150 kV",
  "Payakumbuh - New Sidempuan 1 275kV",
  "Payakumbuh - New Sidempuan 2 275kV",
  "Panyabungan - New Padang Sidempuan 1 150kV",
  "Panyabungan - New Padang Sidempuan 2 150kV",
  "Gunung Tua - Sibuhuan 1 150 kV",
  "Gunung Tua - Sibuhuan 2 150 kV",
  "Panyabungan - SMGP 1 150kV",
  "Panyabungan - SMGP 2 150kV"
];

/* Daftar tetap Lokasi GI untuk form Alat Uji (sesuai permintaan) */
const ALATUJI_LOKASI_LIST = [
  "GI 150KV SIBOLGA","GI 150KV LABUHAN ANGIN","GI 150KV PADANG SIDEMPUAN","GI 150KV GUNUNG TUA",
  "PLTA 150KV SIPAN 1","PLTA 150KV SIPAN 2","GITET 275KV NEW PADANG SIDEMPUAN","GI 150KV NEW PADANG SIDEMPUAN",
  "GI 150KV SIBUHUAN","GI 150KV PANYABUNGAN","GI 150KV KISARAN","GI 150KV KUALA TANJUNG",
  "GI 150KV RANTAU PRAPAT","GI 150KV AEK KANOPAN","GI 150KV SIMANGKE","GI 150KV TANJUNG BALAI",
  "GI 150KV KOTA PINANG","GITET 275KV KUALA TANJUNG","GI 150KV MARTABE"
];

/* ============================================================
   STATE
   ============================================================ */
let STATE = {
  token: localStorage.getItem("sl_token") || null,
  nama: localStorage.getItem("sl_nama") || "",
  role: localStorage.getItem("sl_role") || "",
  master: null,
  masterPromise: null,
  page: "dashboard",
  tglRencana: addDays(new Date(), 1),
  tglRealisasi: new Date(),
  rencanaCache: {},
  alatujiCache: null,
  editingId: null,
  rekapMode: "gi"
};

const UNIT_LIST = ["ULTG KISARAN","ULTG PADANG SIDEMPUAN","PDKB RING","PDKB GI"];

/* ============================================================
   HELPERS
   ============================================================ */
function fmtDMY(d){
  const dd=String(d.getDate()).padStart(2,"0"), mm=String(d.getMonth()+1).padStart(2,"0");
  return `${dd}/${mm}/${d.getFullYear()}`;
}
function fmtISO(d){
  const dd=String(d.getDate()).padStart(2,"0"), mm=String(d.getMonth()+1).padStart(2,"0");
  return `${d.getFullYear()}-${mm}-${dd}`;
}
function isoToDate(iso){ const [y,m,d]=iso.split("-").map(Number); return new Date(y,m-1,d); }
function addDays(d,n){ const c=new Date(d); c.setDate(c.getDate()+n); return c; }
const HARI=["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
const BULAN=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
function displayTgl(d){ return `${HARI[d.getDay()]}, ${d.getDate()} ${BULAN[d.getMonth()]} ${d.getFullYear()}`; }
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2400);
}
function esc(s){ return (s===undefined||s===null)?"":s.toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// Ambil nilai dari <select>; jika user memilih "Lainnya (ketik manual)" ("__lain__"),
// ambil nilai dari input manual di sebelahnya. Dipakai di form Rencana Kerja & Alat Uji.
function resolveSelect(selId, manualId){
  const selEl=document.getElementById(selId);
  const v = selEl ? selEl.value.trim() : "";
  if(v!=="__lain__") return v;
  const manualEl=document.getElementById(manualId);
  return manualEl ? manualEl.value.trim() : "";
}

/* ============================================================
   API — GET (tanpa preflight) & POST (text/plain agar tanpa preflight)
   ============================================================ */
async function apiGet(action, params={}){
  const usp=new URLSearchParams({action, ...params});
  const res=await fetch(`${CONFIG.API_URL}?${usp.toString()}`);
  const json=await res.json();
  if(!json.ok) throw new Error(json.error||"Terjadi kesalahan");
  return json.data;
}
async function apiPost(action, payload={}){
  const body=JSON.stringify({action, token: STATE.token, ...payload});
  const res=await fetch(CONFIG.API_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body
  });
  const json=await res.json();
  if(!json.ok) throw new Error(json.error||"Terjadi kesalahan");
  return json;
}

/* ============================================================
   AUTH
   ============================================================ */
document.getElementById("btnLogin").addEventListener("click", doLogin);
document.getElementById("loginPass").addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });

async function doLogin(){
  const username=document.getElementById("loginUser").value.trim();
  const password=document.getElementById("loginPass").value;
  const errEl=document.getElementById("loginError");
  errEl.textContent="";
  if(!username||!password){ errEl.textContent="Isi username dan password"; return; }
  const btn=document.getElementById("btnLogin");
  btn.disabled=true; btn.textContent="Memproses...";
  try{
    const body=JSON.stringify({action:"login",username,password});
    const res=await fetch(CONFIG.API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body});
    const json=await res.json();
    if(!json.ok){ errEl.textContent=json.error||"Login gagal"; return; }
    STATE.token=json.token; STATE.nama=json.nama; STATE.role=json.role;
    localStorage.setItem("sl_token",json.token);
    localStorage.setItem("sl_nama",json.nama);
    localStorage.setItem("sl_role",json.role||"");
    enterApp();
  }catch(e){
    errEl.textContent="Gagal terhubung ke server. Cek koneksi / URL API.";
  }finally{
    btn.disabled=false; btn.textContent="Masuk";
  }
}

function doLogout(){
  apiPost("logout").catch(()=>{});
  localStorage.removeItem("sl_token"); localStorage.removeItem("sl_nama"); localStorage.removeItem("sl_role");
  STATE.token=null;
  document.getElementById("app").classList.add("hidden");
  document.getElementById("loginScreen").style.display="flex";
}

async function enterApp(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("avatarInitial").textContent=(STATE.nama||"?").charAt(0).toUpperCase();
  document.getElementById("todayLabel").textContent=displayTgl(new Date());
  // Render dashboard SEGERA tanpa menunggu masterdata (agar terasa lebih cepat).
  // Masterdata (untuk dropdown form) dimuat di latar belakang & di-cache di server.
  goto("dashboard");

/* ============================================================
   RENCANA KERJA
   ============================================================ */
async function getRencanaCached(tgl, force){
  if(!force && STATE.rencanaCache[tgl]) return STATE.rencanaCache[tgl];
  const rows = await apiGet("rencana",{tanggal:tgl});
  STATE.rencanaCache[tgl]=rows;
  return rows;
}

function renderRencana(main){
  const tgl=STATE.tglRencana;
  main.innerHTML = `
    <div class="page-head"><h2>Rencana Kerja</h2></div>
    <div class="datebar">
      <button class="icon-btn" onclick="shiftTgl('rencana',-1)">‹</button>
      <input type="date" id="dateRencana" value="${fmtISO(tgl)}">
      <button class="icon-btn" onclick="shiftTgl('rencana',1)">›</button>
      <button class="icon-btn" title="Kirim ke WA" onclick="kirimWA('rencana')">📲</button>
    </div>
    <div id="rencanaList"><div class="loader"></div></div>
  `;
  document.getElementById("dateRencana").addEventListener("change",e=>{
    STATE.tglRencana=isoToDate(e.target.value); renderRencana(main);
  });
  loadRencanaList();
}

async function loadRencanaList(force){
  const el=document.getElementById("rencanaList");
  try{
    const rows=await getRencanaCached(fmtDMY(STATE.tglRencana),force);
    if(rows.length===0){
      el.innerHTML=`<div class="empty-state"><div class="ic">🗒️</div>Belum ada rencana kerja<br>untuk tanggal ini</div>`;
      return;
    }
    el.innerHTML = groupAndRenderCards(rows,"rencana");
  }catch(e){ el.innerHTML=`<div class="empty-state">Gagal memuat data.<br>${esc(e.message)}</div>`; }
}

function groupAndRenderCards(rows, mode){
  let html="";
  UNIT_LIST.forEach(unit=>{
    const items=rows.filter(r=>r.Unit===unit);
    if(items.length===0) return;
    html+=`<div class="section-label">${unit}</div>`;
    items.forEach(r=> html+=workCard(r,mode));
  });
  const lain=rows.filter(r=>!UNIT_LIST.includes(r.Unit));
  if(lain.length){ html+=`<div class="section-label">Lainnya</div>`; lain.forEach(r=>html+=workCard(r,mode)); }
  return html;
}

function workCard(r, mode){
  const padamClass = r.Status==="Padam" ? "padam":"";
  const badgeStatus = r.Status==="Padam" ? `<span class="badge padam">PADAM</span>` : `<span class="badge tidak">TIDAK PADAM</span>`;
  const progBadgeMap={SELESAI:"selesai",PROSES:"proses",BATAL:"batal"};
  const progClass=progBadgeMap[r.Progres]||"belum";
  const progLabel=r.Progres||"BELUM UPDATE";
  return `
    <div class="work-card ${padamClass}">
      <div class="top">
        <h4>${esc(r.Judul)}</h4>
        ${mode==="rencana" ? badgeStatus : `<span class="badge ${progClass}">${esc(progLabel)}</span>`}
      </div>
      <div class="meta">
        ${esc(r.Pihak)} · ${esc(r.JenisPekerjaan||"-")}<br>
        PJ: ${esc(r.PJ||"-")} &nbsp;|&nbsp; PK3: ${esc(r.PK3||"-")} &nbsp;|&nbsp; PP: ${esc(r.PP||"-")}
        ${r.LinkIzinKerja ? `<br><a href="${esc(r.LinkIzinKerja)}" target="_blank" rel="noopener">Lihat izin kerja (WP)</a>`:""}
      </div>
      <div class="actions">
        ${mode==="rencana" ? `
          <button onclick="openRencanaForm('${r.ID}')">✏️ Ubah</button>
          <button onclick="hapusRencana('${r.ID}')">🗑️ Hapus</button>
        ` : `
          <button onclick="openProgresForm('${r.ID}','${esc(r.Progres||"")}','${esc(r.CatatanRealisasi||"")}')">🔄 Update Progres</button>
        `}
      </div>
    </div>`;
}

function shiftTgl(which,n){
  const key = which==="rencana"?"tglRencana":"tglRealisasi";
  STATE[key]=addDays(STATE[key],n);
  render();
}

async function hapusRencana(id){
  if(!confirm("Hapus rencana kerja ini?")) return;
  try{
    await apiPost("deleteRencana",{id});
    toast("Data dihapus");
    await loadRencanaList(true);
  }catch(e){ toast("Gagal: "+e.message); }
}

async function kirimWA(type){
  const tgl = type==="rencana" ? fmtDMY(STATE.tglRencana) : fmtDMY(STATE.tglRealisasi);
  if(!confirm(`Kirim laporan ${type==="rencana"?"rencana kerja":"realisasi kerja"} (${tgl}) ke grup WhatsApp sekarang?`)) return;
  try{
    await apiPost("sendWA",{type,tanggal:tgl});
    toast("Terkirim ke WhatsApp ✅");
  }catch(e){ toast("Gagal kirim: "+e.message); }
}

function onLokasiGIChange(){
  const gi=document.getElementById("f_LokasiGI").value;

  populateBayOptions(gi==="__lain__" ? "" : gi);

function populateBayOptions(gi, selectedBay){
  const m=STATE.master||{};
  const bays=(m.giBayMap && m.giBayMap[gi]) || [];
  const sel=document.getElementById("f_Bay");
  if(!sel) return;
  sel.innerHTML = `<option value="">Pilih bay</option>` +
    bays.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join("") +
    `<option value="__lain__">Lainnya (ketik manual)</option>`;
  sel.onchange=()=>{
    document.getElementById("f_Bay_manual").style.display = sel.value==="__lain__" ? "block":"none";
  };
  if(selectedBay){
    if(bays.indexOf(selectedBay)!==-1){
      sel.value=selectedBay;
    }else{
      sel.value="__lain__";
      document.getElementById("f_Bay_manual").style.display="block";
      document.getElementById("f_Bay_manual").value=selectedBay;
    }
  }
}

function onLokasiSUTTChange(){
  const v=document.getElementById("f_LokasiSUTT").value;
  document.getElementById("f_LokasiSUTT_manual").style.display = v==="__lain__" ? "block":"none";
}

// Validasi: pastikan semua kolom rencana kerja terisi sebelum data dikirim ke server.
// Mengembalikan array label kolom yang masih kosong (array kosong = form sudah lengkap).
function validateRencanaForm(){
  const missing=[];
  const g=id=>{ const el=document.getElementById(id); return el?el.value.trim():""; };
  const checks=[
    ["f_Tanggal","Tanggal"],["f_Unit","Unit Pelaksana"],["f_Status","Status"],
    ["f_Pihak","Internal/Eksternal"],["f_Terencana","Terencana/Tidak Terencana"],
    ["f_Judul","Judul Pekerjaan"],["f_JenisPekerjaan","Jenis Pekerjaan"],
    ["f_Ketinggian","Bekerja di Ketinggian"],["f_LinkIzinKerja","Link Izin Kerja (WP)"],
    ["f_PJ","Penanggung Jawab Pekerjaan"],["f_PK3","Pengawas K3"],["f_PP","Pengawas Pekerjaan"],
    ["f_JumlahPelaksana","Jumlah Pelaksana"]
  ];
  checks.forEach(([id,label])=>{ if(!g(id)) missing.push(label); });

  const jenisKonstruksi=g("f_JenisKonstruksi");
  if(jenisKonstruksi==="Gardu Induk"){
    if(!resolveSelect("f_LokasiGI","f_LokasiGI_manual")) missing.push("Lokasi GI");
    if(!resolveSelect("f_Bay","f_Bay_manual")) missing.push("Bay");
  }else{
    if(!resolveSelect("f_LokasiSUTT","f_LokasiSUTT_manual")) missing.push("Lokasi SUTT/SUTET");
  }
  return missing;
}

async function saveRencana(){
  const missing = validateRencanaForm();
  if(missing.length>0){
    const shown = missing.slice(0,4).join(", ");
    const sisa = missing.length>4 ? ` (+${missing.length-4} lainnya)` : "";
    toast("Lengkapi dulu: "+shown+sisa);
    return;
  }

  const g=id=>document.getElementById(id).value.trim();
  const tglDate = isoToDate(g("f_Tanggal"));
  const payload = {
    Tanggal: fmtDMY(tglDate), Unit:g("f_Unit"), Pihak:g("f_Pihak"), Status:g("f_Status"),
    Terencana:g("f_Terencana"), LinkIzinKerja:g("f_LinkIzinKerja"), Judul:g("f_Judul"),
    JenisKonstruksi:g("f_JenisKonstruksi"), JenisPekerjaan:g("f_JenisPekerjaan"),
    LokasiGI: resolveSelect("f_LokasiGI","f_LokasiGI_manual"),
    Bay: resolveSelect("f_Bay","f_Bay_manual"),
    LokasiSUTT: resolveSelect("f_LokasiSUTT","f_LokasiSUTT_manual"),
    Ketinggian:g("f_Ketinggian"),
    PJ:g("f_PJ"), PK3:g("f_PK3"), PP:g("f_PP"), JumlahPelaksana:g("f_JumlahPelaksana")
  };
  const btn=document.getElementById("btnSaveRencana");
  btn.disabled=true; btn.textContent="Menyimpan...";
  try{
    if(STATE.editingId){ await apiPost("updateRencana",{id:STATE.editingId,data:payload}); }
    else{ await apiPost("addRencana",{data:payload}); }
    toast("Rencana kerja tersimpan ✅");
    closeSheet();
    STATE.tglRencana=tglDate;
    await loadRencanaList(true);
    renderRencana(document.getElementById("mainContent"));
  }catch(e){ toast("Gagal simpan: "+e.message); }
  finally{ btn.disabled=false; btn.textContent="Simpan"; }
}

function renderAlatUji(main){
  main.innerHTML=`
    <div class="page-head"><h2>Riwayat Alat Uji</h2></div>
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" id="alatujiSearch" placeholder="Cari serial, nama alat, PIC, lokasi...">
    </div>
    <div id="alatujiList"><div class="loader"></div></div>
  `;
  let timer;
  document.getElementById("alatujiSearch").addEventListener("input",e=>{
    clearTimeout(timer);
    timer=setTimeout(()=>loadAlatUjiList(e.target.value),350);
  });
  loadAlatUjiList();
}

async function loadAlatUjiList(q){
  const el=document.getElementById("alatujiList");
  try{
    const rows=await apiGet("alatuji",{q:q||""});
    STATE.alatujiCache=rows;
    if(rows.length===0){ el.innerHTML=`<div class="empty-state"><div class="ic">🧰</div>Belum ada data alat uji</div>`; return; }
    el.innerHTML = rows.map(alatCard).join("");
  }catch(e){ el.innerHTML=`<div class="empty-state">Gagal memuat data.<br>${esc(e.message)}</div>`; }
}

function alatCard(r){
  const kondisiBadge = r.Kondisi==="Baik" ? `<span class="badge tidak">BAIK</span>` : `<span class="badge padam">RUSAK</span>`;
  const mapsLink = (r.Latitude && r.Longitude) ? `<br><a href="https://maps.google.com/?q=${r.Latitude},${r.Longitude}" target="_blank" rel="noopener">📍 Lihat lokasi di peta</a>` : "";
  const foto = r.FotoURL ? r.FotoURL.split(" | ").map(u=>`<a href="${esc(u)}" target="_blank" rel="noopener">Foto</a>`).join(" · ") : "";
  return `
    <div class="work-card">
      <div class="top"><h4>${esc(r.NamaAlat)} — ${esc(r.Serial)}</h4>${kondisiBadge}</div>
      <div class="meta">
        Merk/Tipe: ${esc(r.Merk||"-")} / ${esc(r.Tipe||"-")}<br>
        Tanggal: ${esc(r.Tanggal||"-")} · PIC: ${esc(r.PIC||"-")}<br>
        Lokasi: ${esc(r.Lokasi||"-")} · Kelengkapan: ${esc(r.Kelengkapan||"-")} · Bersih: ${esc(r.Bersih||"-")}
        ${r.Keterangan ? `<br>Ket: ${esc(r.Keterangan)}`:""}
        ${foto ? `<br>${foto}`:""}
        ${mapsLink}
      </div>
      <div class="actions">
        <button onclick="openAlatUjiForm('${r.ID}')">✏️ Ubah</button>
        <button onclick="hapusAlatUji('${r.ID}')">🗑️ Hapus</button>
      </div>
    </div>`;
}

async function hapusAlatUji(id){
  if(!confirm("Hapus data alat uji ini?")) return;
  try{ await apiPost("deleteAlatUji",{id}); toast("Data dihapus"); await loadAlatUjiList(); }
  catch(e){ toast("Gagal: "+e.message); }
}

let pendingPhotos=[null,null];

function onLokasiAlatChange(){
  const v=document.getElementById("a_Lokasi").value;
  document.getElementById("a_Lokasi_manual").style.display = v==="__lain__" ? "block":"none";
}

function ambilLokasi(){
  const status=document.getElementById("gpsStatus");
  status.textContent="Mengambil lokasi...";
  if(!navigator.geolocation){ status.textContent="Geolocation tidak didukung browser ini."; return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    document.getElementById("a_Lat").value=pos.coords.latitude;
    document.getElementById("a_Lng").value=pos.coords.longitude;
    status.textContent=`Lokasi tersimpan: ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
  },err=>{ status.textContent="Gagal mengambil lokasi: "+err.message; },{enableHighAccuracy:true,timeout:10000});
}

/* ---------- SCAN BARCODE ALAT UJI ---------- */
let html5QrScanner=null;
let scanHandled=false;

function openScanner(){
  scanHandled=false;
  document.getElementById("qrStatus").textContent="Menyalakan kamera...";
  document.getElementById("scannerOverlay").classList.add("open");
  setTimeout(()=>{
    if(typeof Html5Qrcode==="undefined"){
      document.getElementById("qrStatus").textContent="Modul scanner gagal dimuat. Cek koneksi internet lalu coba lagi.";
      return;
    }
    try{
      html5QrScanner = new Html5Qrcode("qrReader");
      const scanConfig = { fps: 10, qrbox: 230 };
      try{
        if(window.Html5QrcodeSupportedFormats){
          const F=window.Html5QrcodeSupportedFormats;
          scanConfig.formatsToSupport=[F.QR_CODE,F.CODE_128,F.CODE_39,F.EAN_13,F.EAN_8,F.UPC_A,F.UPC_E,F.ITF];
        }
      }catch(e){}
      html5QrScanner.start(
        { facingMode: "environment" },
        scanConfig,
        onScanSuccess,
        ()=>{ /* abaikan kegagalan pembacaan per-frame */ }
      ).catch(err=>{
        document.getElementById("qrStatus").textContent="Gagal membuka kamera: "+err;
      });
    }catch(err){
      document.getElementById("qrStatus").textContent="Scanner tidak tersedia: "+err.message;
    }
  },250);
}

function closeScanner(){
  if(html5QrScanner){
    const s=html5QrScanner;
    html5QrScanner=null;
    s.stop().then(()=>s.clear()).catch(()=>{});
  }
  document.getElementById("scannerOverlay").classList.remove("open");
}

async function onScanSuccess(decodedText){
  if(scanHandled) return; // cegah callback terpanggil berkali-kali untuk 1 hasil scan yang sama
  scanHandled=true;
  const status=document.getElementById("qrStatus");
  if(status) status.textContent="Kode terbaca: "+decodedText;
  closeScanner();

  const serialInput=document.getElementById("a_Serial");
  if(serialInput) serialInput.value=decodedText;

  toast("Mencari data alat...");
  try{
    const info = await apiGet("lookupAlat",{kode:decodedText});
    if(info && info.found){
      const set=(id,v)=>{ const el=document.getElementById(id); if(el && v) el.value=v; };
      set("a_NamaAlat", info.NamaAlat);
      set("a_Merk", info.Merk);
      set("a_Tipe", info.Tipe);
      toast("Data alat ditemukan ✅");
    }else{
      toast("Kode tidak ditemukan di database, silakan isi manual");
    }
  }catch(e){ toast("Gagal mencari data: "+e.message); }
}

function handlePhoto(e,idx){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    pendingPhotos[idx]={filename:file.name, mimeType:file.type, base64:reader.result.split(",")[1]};
    document.getElementById(`photoSlot${idx}`).innerHTML=`<img src="${reader.result}">`;
  };
  reader.readAsDataURL(file);
}

document.addEventListener("click",e=>{
  if(e.target.id==="btnSaveAlatUji") saveAlatUji();
});

async function saveAlatUji(){
  const g=id=>document.getElementById(id).value.trim();
  const sel=id=>{ const el=document.querySelector(`#${id} .radio-opt.sel`); return el?el.dataset.v:""; };
  const payload={
    Serial:g("a_Serial"), NamaAlat:g("a_NamaAlat"), Merk:g("a_Merk"), Tipe:g("a_Tipe"),
    Tanggal: (()=>{ const v=g("a_Tanggal"); return v? fmtDMY(isoToDate(v)) : ""; })(),
    PIC:g("a_PIC"), Lokasi:resolveSelect("a_Lokasi","a_Lokasi_manual"), Latitude:g("a_Lat"), Longitude:g("a_Lng"),
    Kelengkapan:sel("a_kelengkapan_group"), Kondisi:sel("a_kondisi_group"), Bersih:sel("a_bersih_group"),
    Keterangan:g("a_Keterangan")
  };
  if(!payload.NamaAlat){ toast("Nama alat uji wajib diisi"); return; }
  const fotos=pendingPhotos.filter(Boolean);
  const btn=document.getElementById("btnSaveAlatUji");
  btn.disabled=true; btn.textContent="Menyimpan...";
  try{
    if(STATE.editingId){ await apiPost("updateAlatUji",{id:STATE.editingId,data:payload,fotos}); }
    else{ await apiPost("addAlatUji",{data:payload,fotos}); }
    toast("Data alat uji tersimpan ✅");
    closeSheet();
    await loadAlatUjiList();
  }catch(e){ toast("Gagal simpan: "+e.message); }
  finally{ btn.disabled=false; btn.textContent="Simpan"; }
}

function renderRekap(main){
  const m=STATE.master||{};
  const giList=Object.keys(m.giBayMap||{}).sort();
  const mode=STATE.rekapMode||"gi";
  main.innerHTML=`
    <div class="page-head">

      <div class="radio-opt ${mode==='sutt'?'sel':''}" id="rekapModeSUTT" onclick="setRekapMode('sutt')">SUTT/SUTET</div>
    </div>

    <div id="rekapFilterGI" class="${mode==='gi'?'':'hidden'}">
      <div class="field"><label>Lokasi GI</label>
        <select id="rk_GI" onchange="onRekapGIChange()">
          <option value="">Pilih GI</option>
          ${giList.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join("")}
        </select>
      </div>
      <div class="field"><label>Bay</label>
        <select id="rk_Bay"><option value="">Semua Bay</option></select>
      </div>
    </div>

    <div id="rekapFilterSUTT" class="${mode==='sutt'?'':'hidden'}">
      <div class="field"><label>Segmen SUTT/SUTET</label>
        <select id="rk_SUTT">
          <option value="">Pilih segmen</option>
          ${DATASUTT_LIST.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("")}
        </select>
      </div>
    </div>

    <div class="row2">
      <div class="field"><label>Dari Tanggal</label><input type="date" id="rk_Dari"></div>
      <div class="field"><label>Sampai Tanggal</label><input type="date" id="rk_Sampai"></div>
    </div>
    <div style="font-size:11px;color:var(--teks-lemah);margin:-6px 2px 12px;">Kosongkan tanggal untuk menampilkan seluruh riwayat.</div>

    <div id="rekapResult" style="margin-top:16px;"></div>
  `;

function setRekapMode(mode){
  STATE.rekapMode=mode;
  document.getElementById("rekapModeGI").classList.toggle("sel", mode==="gi");
  document.getElementById("rekapModeSUTT").classList.toggle("sel", mode==="sutt");
  document.getElementById("rekapFilterGI").classList.toggle("hidden", mode!=="gi");
  document.getElementById("rekapFilterSUTT").classList.toggle("hidden", mode!=="sutt");
}

function onRekapGIChange(){
  const gi=document.getElementById("rk_GI").value;
  const m=STATE.master||{};
  const bays=(m.giBayMap && m.giBayMap[gi]) || [];
  const sel=document.getElementById("rk_Bay");
  sel.innerHTML = `<option value="">Semua Bay</option>` + bays.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join("");
}

async function loadRekap(){
  const mode=STATE.rekapMode||"gi";
  const dari=document.getElementById("rk_Dari").value;
  const sampai=document.getElementById("rk_Sampai").value;
  const resultEl=document.getElementById("rekapResult");
  const params={ mode };

  if(mode==="gi"){
    const gi=document.getElementById("rk_GI").value;
    if(!gi){ toast("Pilih lokasi GI terlebih dahulu"); return; }
    params.gi=gi;
    params.bay=document.getElementById("rk_Bay").value;
  }else{
    const sutt=document.getElementById("rk_SUTT").value;
    if(!sutt){ toast("Pilih segmen SUTT terlebih dahulu"); return; }
    params.sutt=sutt;
  }
  if(dari) params.dari=fmtDMY(isoToDate(dari));
  if(sampai) params.sampai=fmtDMY(isoToDate(sampai));

  resultEl.innerHTML=`<div class="loader"></div>`;
  try{
    const rows=await apiGet("rekap",params);
    if(rows.length===0){ resultEl.innerHTML=`<div class="empty-state"><div class="ic">📭</div>Tidak ada pekerjaan ditemukan</div>`; return; }
    resultEl.innerHTML = rows.map(rekapCard).join("");
  }catch(e){ resultEl.innerHTML=`<div class="empty-state">Gagal memuat rekap.<br>${esc(e.message)}</div>`; }
}

function rekapCard(r){
  const progBadgeMap={SELESAI:"selesai",PROSES:"proses",BATAL:"batal"};
  const progClass=progBadgeMap[r.Progres]||"belum";
  const progLabel=r.Progres||"BELUM UPDATE";
  const lokasiLine = r.JenisKonstruksi==="Gardu Induk"
    ? `${esc(r.LokasiGI||"-")} / Bay ${esc(r.Bay||"-")}`
    : esc(r.LokasiSUTT||"-");
  return `
    <div class="work-card ${r.Status==="Padam"?"padam":""}">
      <div class="top">
        <h4>${esc(r.Tanggal)} — ${esc(r.Judul)}</h4>
        <span class="badge ${progClass}">${esc(progLabel)}</span>
      </div>
      <div class="meta">
        ${lokasiLine}<br>
        ${esc(r.Unit)} · ${esc(r.Pihak)} · ${esc(r.JenisPekerjaan||"-")}<br>
        PJ: ${esc(r.PJ||"-")}
      </div>
    </div>`;
}
